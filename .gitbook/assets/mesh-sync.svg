<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#2b2b2b"/>
    </marker>
    <marker id="arrowStart" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 9 0 L 0 4.5 L 9 9 z" fill="#2b2b2b"/>
    </marker>
    <style>
      .title { font: 700 42px Arial, Helvetica, sans-serif; fill: #111; }
      .h1 { font: 700 28px Arial, Helvetica, sans-serif; fill: #111; }
      .h2 { font: 400 20px Arial, Helvetica, sans-serif; fill: #333; }
      .peer-label { font: 700 20px Arial, Helvetica, sans-serif; fill: #111; }
      .legend { font: 400 18px Arial, Helvetica, sans-serif; fill: #111; }
      .legend-bold { font: 700 18px Arial, Helvetica, sans-serif; fill: #111; }
      .box { fill: none; stroke: #111; stroke-width: 4; }
      .group { fill: none; stroke: #777; stroke-width: 2.5; stroke-dasharray: 9 9; }
      .sync { fill: none; stroke: #333; stroke-width: 2.5; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .local { fill: none; stroke: #333; stroke-width: 2.5; marker-start: url(#arrowStart); marker-end: url(#arrow); }
      .broken { fill: none; stroke: #333; stroke-width: 2.5; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .phone { fill: none; stroke: #111; stroke-width: 4; }
      .xline { stroke: #111; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="#fff"/>

  <text x="40" y="58" class="title">ObjectBox Mesh Sync</text>

  <!-- Sync server -->
  <rect x="690" y="92" width="220" height="102" rx="12" class="box"/>
  <text x="800" y="134" text-anchor="middle" class="h1">ObjectBox</text>
  <text x="800" y="166" text-anchor="middle" class="h1">Sync Server</text>

  <!-- Mesh groups -->
  <rect x="90" y="310" width="650" height="540" rx="32" class="group"/>
  <rect x="860" y="310" width="650" height="540" rx="32" class="group"/>

  <text x="125" y="355" class="h1">Mesh Sync Group 1</text>
  <text x="125" y="383" class="h2">Connected to Sync Server</text>

  <text x="895" y="355" class="h1">Mesh Sync Group 2</text>
  <text x="895" y="383" class="h2">Local only – no server connection</text>

  <!-- Server connection to Group 1 via Peer A -->
  <path d="M 760 194 C 760 240, 470 245, 470 398" class="sync"/>

  <!-- Broken server connection to top of Group 2 -->
  <path d="M 840 194 C 840 245, 1185 245, 1185 305" class="broken"/>
  <g transform="translate(1012 245)">
    <line x1="-12" y1="-12" x2="12" y2="12" class="xline"/>
    <line x1="12" y1="-12" x2="-12" y2="12" class="xline"/>
  </g>

  <!-- Peer phone symbols Group 1 -->
  <g id="peer-a" transform="translate(445 405)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="470" y="520" text-anchor="middle" class="peer-label">Peer A</text>

  <g id="peer-b" transform="translate(235 545)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="260" y="660" text-anchor="middle" class="peer-label">Peer B</text>

  <g id="peer-c" transform="translate(625 545)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="650" y="660" text-anchor="middle" class="peer-label">Peer C</text>

  <g id="peer-d" transform="translate(335 725)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="360" y="840" text-anchor="middle" class="peer-label">Peer D</text>

  <g id="peer-e" transform="translate(555 725)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="580" y="840" text-anchor="middle" class="peer-label">Peer E</text>

  <!-- Local mesh connections Group 1: avoids A-E, C-E, C-D; Peer E has one connection -->
  <path d="M 440 470 L 292 560" class="local"/>
  <path d="M 500 470 L 618 560" class="local"/>
  <path d="M 292 586 L 618 586" class="local"/>
  <path d="M 280 635 L 343 720" class="local"/>
  <path d="M 392 766 L 548 766" class="local"/>

  <!-- Peer phone symbols Group 2 -->
  <g id="peer-f" transform="translate(1135 425)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="1160" y="540" text-anchor="middle" class="peer-label">Peer F</text>

  <g id="peer-g" transform="translate(970 545)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="995" y="660" text-anchor="middle" class="peer-label">Peer G</text>

  <g id="peer-h" transform="translate(1300 545)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="1325" y="660" text-anchor="middle" class="peer-label">Peer H</text>

  <g id="peer-i" transform="translate(1035 725)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="1060" y="840" text-anchor="middle" class="peer-label">Peer I</text>

  <g id="peer-j" transform="translate(1235 725)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="1260" y="840" text-anchor="middle" class="peer-label">Peer J</text>

  <!-- Local mesh connections Group 2: avoids G-I; Peer I has one connection -->
  <path d="M 1128 475 L 1028 552" class="local"/>
  <path d="M 1192 475 L 1292 552" class="local"/>
  <path d="M 1080 720 L 1292 586" class="local"/>
  <path d="M 1315 635 L 1270 720" class="local"/>
  <path d="M 1092 766 L 1228 766" class="local"/>

  <!-- Legend -->
  <rect x="310" y="900" width="1000" height="80" rx="10" fill="none" stroke="#c7c7c7" stroke-width="2"/>
  <path d="M 345 935 L 410 935" class="local"/>
  <text x="440" y="928" class="legend">Local mesh sync</text>
  <text x="440" y="952" class="legend">peer-to-peer</text>

  <path d="M 660 935 L 730 935" class="sync"/>
  <text x="760" y="928" class="legend">Sync with server</text>
  <text x="760" y="952" class="legend">via connected peer</text>

  <g transform="translate(1040 913)">
    <rect x="0" y="0" width="35" height="55" rx="6" class="phone"/>
  </g>
  <text x="1110" y="928" class="legend-bold">Peer device</text>
  <text x="1110" y="952" class="legend">ObjectBox Sync Client</text>
</svg>
