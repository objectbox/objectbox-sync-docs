<svg xmlns="http://www.w3.org/2000/svg" width="1110" height="920" viewBox="0 0 1110 920">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#2b2b2b"/>
    </marker>
    <marker id="arrowStart" markerWidth="9" markerHeight="9" refX="1" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 9 0 L 0 4.5 L 9 9 z" fill="#2b2b2b"/>
    </marker>
    <style>
      .h1 { font: 700 28px Arial, Helvetica, sans-serif; fill: #111; }
      .h2 { font: 400 20px Arial, Helvetica, sans-serif; fill: #333; }
      .peer-label { font: 700 20px Arial, Helvetica, sans-serif; fill: #111; }
      .legend { font: 400 18px Arial, Helvetica, sans-serif; fill: #111; }
      .legend-bold { font: 700 18px Arial, Helvetica, sans-serif; fill: #111; }
      .box { fill: none; stroke: #111; stroke-width: 4; }
      .group { fill: none; stroke: #777; stroke-width: 2.5; stroke-dasharray: 9 9; }
      .sync { fill: none; stroke: #333; stroke-width: 2.5; stroke-dasharray: 10 8; marker-start: url(#arrowStart); marker-end: url(#arrow); }
      .local { fill: none; stroke: #333; stroke-width: 2.5; marker-start: url(#arrowStart); marker-end: url(#arrow); }
      .broken { fill: none; stroke: #333; stroke-width: 2.5; stroke-dasharray: 10 8; marker-start: url(#arrowStart); marker-end: url(#arrow); }
      .phone { fill: none; stroke: #111; stroke-width: 4; }
      .xline { stroke: #111; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1110" height="920" fill="#fff"/>

  <!-- Sync server -->
  <rect x="450" y="30" width="220" height="102" rx="12" class="box"/>
  <text x="560" y="72" text-anchor="middle" class="h1">ObjectBox</text>
  <text x="560" y="104" text-anchor="middle" class="h1">Sync Server</text>

  <!-- Mesh groups -->
  <rect x="100" y="220" width="420" height="540" rx="32" class="group"/>
  <rect x="600" y="220" width="420" height="540" rx="32" class="group"/>

  <text x="135" y="265" class="h1">Mesh Sync Group 1</text>
  <text x="135" y="293" class="h2">Connected to Sync Server</text>

  <text x="635" y="265" class="h1">Mesh Sync Group 2</text>
  <text x="635" y="293" class="h2">Local only – no server connection</text>

  <!-- Server connection to Group 1 via Peer A -->
  <path d="M 520 132 C 520 175, 455 205, 455 308" class="sync"/>

  <!-- Broken server connection to top of Group 2 -->
  <path d="M 600 132 C 600 175, 730 175, 770 215" class="broken"/>
  <g transform="translate(679 173)">
    <line x1="-12" y1="-12" x2="12" y2="12" class="xline"/>
    <line x1="12" y1="-12" x2="-12" y2="12" class="xline"/>
  </g>

  <!-- Peer phone symbols Group 1 -->
  <g id="peer-a" transform="translate(430 315)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="455" y="430" text-anchor="middle" class="peer-label">Peer A</text>

  <g id="peer-b" transform="translate(140 445)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="165" y="560" text-anchor="middle" class="peer-label">Peer B</text>

  <g id="peer-c" transform="translate(430 495)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="455" y="610" text-anchor="middle" class="peer-label">Peer C</text>

  <g id="peer-d" transform="translate(260 625)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="285" y="740" text-anchor="middle" class="peer-label">Peer D</text>

  <g id="peer-e" transform="translate(410 625)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="435" y="740" text-anchor="middle" class="peer-label">Peer E</text>

  <!-- Local mesh connections Group 1: avoids A-E, C-E, C-D; Peer E has one connection -->
  <path d="M 425 380 L 197 460" class="local"/>
  <path d="M 197 486 L 425 536" class="local"/>
  <path d="M 197 515 L 273 620" class="local"/>
  <path d="M 317 666 L 403 666" class="local"/>

  <!-- Peer phone symbols Group 2 -->
  <g id="peer-f" transform="translate(810 335)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="835" y="450" text-anchor="middle" class="peer-label">Peer F</text>

  <g id="peer-g" transform="translate(640 445)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="665" y="560" text-anchor="middle" class="peer-label">Peer G</text>

  <g id="peer-h" transform="translate(930 445)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="955" y="560" text-anchor="middle" class="peer-label">Peer H</text>

  <g id="peer-i" transform="translate(740 625)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="765" y="740" text-anchor="middle" class="peer-label">Peer I</text>

  <g id="peer-j" transform="translate(890 625)">
    <rect x="0" y="0" width="50" height="82" rx="8" class="phone"/>
  </g>
  <text x="915" y="740" text-anchor="middle" class="peer-label">Peer J</text>

  <!-- Local mesh connections Group 2: avoids G-I; Peer I has one connection -->
  <path d="M 805 395 L 695 460" class="local"/>
  <path d="M 865 395 L 925 460" class="local"/>
  <path d="M 695 495 L 925 480" class="local"/>
  <path d="M 785 620 L 925 500" class="local"/>
  <path d="M 797 666 L 883 666" class="local"/>

  <!-- Legend -->
  <rect x="100" y="800" width="920" height="80" rx="10" fill="none" stroke="#c7c7c7" stroke-width="2"/>
  <path d="M 130 835 L 185 835" class="local"/>
  <text x="205" y="828" class="legend">Local mesh sync</text>
  <text x="205" y="852" class="legend">peer-to-peer</text>

  <path d="M 405 835 L 465 835" class="sync"/>
  <text x="485" y="828" class="legend">Sync with server</text>
  <text x="485" y="852" class="legend">via connected peer</text>

  <g transform="translate(755 813)">
    <rect x="0" y="0" width="35" height="55" rx="6" class="phone"/>
  </g>
  <text x="810" y="828" class="legend-bold">Peer device</text>
  <text x="810" y="852" class="legend">ObjectBox Sync Client</text>
</svg>
